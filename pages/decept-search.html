<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decepticon Database Search</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <main class="d-flex align-items-center justify-content-center ">
        <div class="database-card">
            <form class="d-flex" id="searchForm">
                <input id="searchInput" class="form-control me-2" type="search" placeholder="Search"
                    aria-label="Search">

                <button id="searchButton" class="btn btn-outline-success" type="button">Search</button>
            </form>

            <div class="mt-3">
                <p id="searchMessage" class="text-center"></p>
                <ul id="searchResults"></ul>
            </div>
        </div>
    </main>


    <script src="../data/data.js"></script>
    <script src="../scripts/step4-global-object-search.js"></script>
</body>

</html>
