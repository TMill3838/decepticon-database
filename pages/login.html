<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Decepticon Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/style.css">

</head>

<a href="../index.html" class="search text-decoration-none">
    <span class="back-arrow"></span> Back to Home
</a>

<body class="bg-dark text-white">
    <main class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="database-card" style="width: 22rem;">
            <h2 class="text-center text-purple">Access Terminal</h2>
            <form id="decepticon-login">
                <div class="mb-3">
                    <label class="form-label">Decepticon ID</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Access Code</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="search w-100">Initialize Login</button>
            </form>
            <p id="message" class="text-danger mt-2 text-center"></p>
        </div>
    </main>
    <script src="../scripts/login-logout.js"></script>

</body>

</html>
